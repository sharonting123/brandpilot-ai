<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="BrandPilot AI: 连锁餐饮品牌经营分析 Agent 编排系统" />
  <title>BrandPilot AI — 品牌经营 Agent</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <!-- html2pdf CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
</head>
<body>
  <div class="app-container">
    <!-- 左侧对话区 -->
    <aside class="chat-panel" id="chatPanel">
      <div class="chat-header">
        <div class="chat-brand">
          <span class="brand-icon">BP</span>
          <div>
            <h1 class="chat-title">BrandPilot AI</h1>
            <p class="chat-subtitle">品牌经营 Agent 编排系统</p>
          </div>
        </div>
        <div class="chat-status">
          <span class="status-dot" id="connectionDot" title="连接状态"></span>
          <span class="status-text" id="statusText">就绪</span>
        </div>
      </div>

      <!-- 品牌选择 -->
      <div class="brand-selector">
        <label class="selector-label">当前品牌</label>
        <select id="brandSelect" class="selector-input">
          <option value="haidilao">海底捞</option>
        </select>
      </div>

      <!-- 对话流 -->
      <div class="chat-messages" id="chatMessages">
        <!-- 欢迎消息 -->
        <div class="message assistant">
          <div class="message-avatar">🤖</div>
          <div class="message-body">
            <div class="message-content">
              <p>你好！我是 BrandPilot AI 品牌经营助手。我能帮你：</p>
              <ul>
                <li><strong>品牌年度提案</strong> — 全链路分析 + 策略建议 + 可下载提案</li>
                <li><strong>链路诊断</strong> — 搜索到核销漏斗分析，找最大损耗点</li>
                <li><strong>竞对对比</strong> — 美团 vs 抖音 vs 私域多平台对比</li>
                <li><strong>数据问答</strong> — 查具体数据如 GMV、核销率、ROI 等</li>
              </ul>
              <p>目前支持品牌：<strong>海底捞</strong>。请直接说出你的需求：</p>
              <div class="example-prompts">
                <button class="example-btn" data-prompt="帮海底捞做一份2026上半年的年度提案">📋 生成年度提案</button>
                <button class="example-btn" data-prompt="海底捞从搜索到核销的转化链路哪里损耗最大？">🔍 链路诊断</button>
                <button class="example-btn" data-prompt="海底捞在美团和抖音的表现对比一下">📊 竞对对比</button>
                <button class="example-btn" data-prompt="海底捞6月的GMV和核销率是多少？">📈 数据查询</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 输入区 -->
      <div class="chat-input-area">
        <textarea
          id="chatInput"
          class="chat-input"
          placeholder="输入你的问题，例如：帮海底捞做一份2026上半年的年度提案..."
          rows="2"
        ></textarea>
        <button id="sendButton" class="send-button" title="发送 (Enter)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 2L11 13" />
            <path d="M22 2L15 22L11 13L2 9L22 2Z" />
          </svg>
        </button>
      </div>
    </aside>

    <!-- 右侧可视化面板 -->
    <main class="viz-panel" id="vizPanel">
      <!-- 空状态 -->
      <div class="viz-empty" id="vizEmpty">
        <div class="empty-icon">📊</div>
        <h2>可视化面板</h2>
        <p>在左侧输入问题开始分析，图表和提案将显示在这里。</p>
      </div>

      <!-- 提案内容（annual_proposal 时显示） -->
      <div class="viz-proposal" id="vizProposal" style="display:none;">
        <div class="proposal-toolbar">
          <h2 class="proposal-title" id="proposalTitle">经营提案</h2>
          <button id="downloadPdfButton" class="pdf-button" title="下载 PDF">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            下载 PDF
          </button>
        </div>
        <div class="proposal-body" id="proposalBody"></div>
      </div>

      <!-- 图表区域 -->
      <div class="viz-charts" id="vizCharts"></div>

      <!-- 对话式回答（非提案场景） -->
      <div class="viz-answer" id="vizAnswer" style="display:none;"></div>
    </main>
  </div>

  <!-- 加载提示 -->
  <div class="loading-overlay" id="loadingOverlay" style="display:none;">
    <div class="loading-spinner"></div>
    <p class="loading-text" id="loadingText">Agent 正在分析...</p>
  </div>

  <script src="assets/app.js" defer></script>
</body>
</html>
