<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="BrandPilot AI: 连锁餐饮品牌经营分析 Agent、AR 城市展厅、数字人直播提案工作台"
    />
    <title>BrandPilot AI</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="rail" aria-label="项目导航">
        <div class="brand-mark" aria-hidden="true">BP</div>
        <nav class="rail-nav">
          <button class="rail-button active" data-view="workbench" title="经营提案">经分</button>
          <button class="rail-button" data-view="funnel" title="美团链路归因">链路</button>
          <button class="rail-button" data-view="ar" title="AR 城市展厅">AR</button>
          <button class="rail-button" data-view="live" title="数字人直播">直播</button>
          <button class="rail-button" data-view="infra" title="基建">基建</button>
        </nav>
        <div class="rail-status" id="connectionDot" title="Supabase 连接状态"></div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">BrandPilot AI</p>
            <h1>海底捞半年度提案智能体</h1>
          </div>
          <div class="topbar-actions">
            <select id="brandSelect" class="select" aria-label="选择品牌"></select>
            <button class="text-button" id="syncButton" type="button">同步 Supabase</button>
            <button class="primary-button" id="generateButton" type="button">生成提案</button>
          </div>
        </header>

        <section class="notice" id="runtimeNotice" role="status">
          正在检测 Supabase 连接...
        </section>

        <section class="view active" id="view-workbench" aria-label="经营提案工作台">
          <div class="layout-grid">
            <section class="panel agent-panel">
              <div class="panel-heading">
                <span>Multi-Agent 编排</span>
                <strong id="agentProgressLabel">7/7</strong>
              </div>
              <div class="agent-list" id="agentList"></div>
              <div class="agent-log" id="agentActivityLog" aria-live="polite"></div>
            </section>

            <section class="proposal-stage">
              <div class="proposal-header">
                <div>
                  <p class="eyebrow">经营分析主 Agent</p>
                  <h2 id="proposalTitle">海底捞 2026 H1 半年度经营提案</h2>
                </div>
                <div class="score-block">
                  <span>机会分</span>
                  <strong id="opportunityScore">86</strong>
                </div>
              </div>

              <div class="metric-strip" id="metricStrip"></div>

              <div class="control-strip" aria-label="提案交互控制">
                <select id="scenarioSelect" class="select compact-select" aria-label="选择策略场景">
                  <option value="boost">半年度提案</option>
                  <option value="defense">搜索承接</option>
                  <option value="live">KA 拜访</option>
                </select>
                <button class="text-button" id="runAgentButton" type="button">运行工作流</button>
                <button class="text-button" id="simulateBudgetButton" type="button">策略模拟</button>
                <button class="text-button" id="exportBriefButton" type="button">生成拜访话术</button>
              </div>

              <div class="diagnosis-grid">
                <article class="diagnosis-panel">
                  <h3>关键结论</h3>
                  <ul id="insightList"></ul>
                </article>
                <article class="diagnosis-panel">
                  <h3>推荐动作</h3>
                  <div id="actionList" class="action-list"></div>
                </article>
              </div>

              <div class="timeline" id="timeline"></div>
            </section>

            <aside class="panel side-panel">
              <div class="panel-heading">
                <span>提案资产</span>
                <strong id="proposalCount">0</strong>
              </div>
              <div class="asset-stack" id="assetStack"></div>
            </aside>
          </div>
        </section>
