<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="BrandPilot AI: 连锁餐饮品牌经营分析 Agent 编排系统，含 NL2SQL / RAG" />
  <title>BrandPilot AI — 悦悦 · 品牌经营顾问</title>
  <link rel="stylesheet" href="assets/styles.css?v=meituan" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
</head>
<body class="auth-pending">
  <div class="app-shell">
    <header class="app-topbar">
      <div class="topbar-brand">
        <span class="brand-icon">BP</span>
        <div>
          <h1 class="chat-title">BrandPilot AI</h1>
          <p class="chat-subtitle">经营分析</p>
        </div>
      </div>
      <div class="topbar-status">
        <span class="status-dot" id="connectionDot" title="连接状态"></span>
        <span class="status-text" id="statusText">就绪</span>
      </div>
      <div class="topbar-account">
        <div class="auth-guest" id="authGuest">
          <a href="/login" class="ghost-button sm auth-link-button">登录</a>
          <a href="/login?tab=register" class="primary-button sm auth-link-button">注册</a>
        </div>
        <div class="auth-user" id="authUser" hidden>
          <span class="auth-user-name" id="authUserName"></span>
          <button type="button" class="ghost-button sm" id="logoutButton">退出</button>
        </div>
      </div>
    </header>

    <div class="app-container app-container--chat-only app-container--no-history" id="appContainer">
      <aside class="history-panel" id="sessionSidebar" hidden>
        <div class="history-panel-header">
          <h2 class="panel-title">历史对话</h2>
          <button type="button" class="ghost-button sm" id="newSessionButton" title="新对话">+ 新对话</button>
        </div>
        <div class="session-list" id="sessionList">
          <p class="session-empty">暂无历史会话</p>
        </div>
      </aside>

      <section class="chat-panel" id="chatPanel">
        <div class="chat-panel-header">
          <h2 class="panel-title">本次对话</h2>
          <div class="brand-selector brand-selector--inline">
            <label class="selector-label" for="brandSelect">品牌</label>
            <select id="brandSelect" class="selector-input">
              <option value="haidilao">海底捞</option>
            </select>
          </div>
        </div>


        <div class="chat-messages" id="chatMessages">
          <div class="message assistant">
            <div class="message-avatar message-avatar--brand">
              <img src="assets/assistant-avatar.png" alt="悦悦头像" width="36" height="36" loading="lazy" />
            </div>
            <div class="message-body">
              <div class="message-content">
                <p>你好！我是 <strong>悦悦</strong>，你的专属品牌经营顾问。我可以帮你：</p>
                <ul>
                  <li><strong>智能查数</strong> — 用大白话问经营数据</li>
                  <li><strong>经营手册</strong> — 结合品牌框架给建议</li>
                </ul>
                <p>支持<strong>多轮追问</strong>，历史上下文会带入后续分析。演示数据均标注<strong>统计周期</strong>与<strong>数据口径</strong>，可从示例开始：</p>
                <div class="example-prompts">
                  <button class="example-btn" data-prompt="海底捞2026年6月从搜索到核销的转化链路哪里损耗最大？">🔍 6月搜索流量链路诊断</button>
                  <button class="example-btn" data-prompt="海底捞2026年6月在美团和抖音的表现对比一下">📊 6月竞对平台对比</button>
                  <button class="example-btn" data-prompt="海底捞和呷哺呷哺2026年6月经营表现对比一下">🏷️ 品牌竞品对比</button>
                  <button class="example-btn" data-prompt="海底捞2026年6月的GMV和核销率是多少？">📈 6月数据查询</button>
                  <button class="example-btn" data-prompt="帮海底捞做一份2026年上半年的经营分析">📋 2026上半年经营分析</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="chat-input-area">
          <textarea
            id="chatInput"
            class="chat-input"
            placeholder="输入你的问题，并尽量写明统计周期，例如：海底捞2026年6月的GMV和核销率是多少？"
            rows="2"
          ></textarea>
          <button id="sendButton" class="send-button" title="发送 (Enter)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13" />
              <path d="M22 2L15 22L11 13L2 9L22 2Z" />
            </svg>
          </button>
        </div>
      </section>

      <main class="viz-panel" id="vizPanel">
        <div class="viz-live-panel" id="vizLivePanel" hidden>
          <div class="viz-live-filter" id="vizLiveFilter" aria-label="统计周期筛选"></div>
          <div class="viz-live-scope" id="vizLiveScope" aria-label="当前选中指标"></div>
          <div class="viz-live-cities" id="vizLiveCities" aria-label="城市快捷分析"></div>
        </div>

        <section class="mode-panel active" id="panelAnalysis" data-mode-panel="analysis">
          <div class="viz-empty" id="vizEmpty">
            <div class="empty-icon">📊</div>
            <h2>可视化面板</h2>
            <p>发送第一个问题后，这里会展示分析报告与图表。</p>
          </div>

          <div class="viz-toolbar" id="vizToolbar" hidden>
            <div>
              <h2 class="viz-toolbar-title" id="vizToolbarTitle">分析结果</h2>
              <p class="viz-toolbar-subtitle" id="vizToolbarSubtitle"></p>
            </div>
            <div class="viz-export-actions">
              <button id="downloadPdfButton" class="pdf-button" type="button" title="下载 PDF 文档">PDF</button>
              <button id="downloadWordButton" class="export-button" type="button" title="下载 Word 文档">Word</button>
              <button id="downloadMarkdownButton" class="export-button" type="button" title="下载 Markdown 文档">Markdown</button>
            </div>
          </div>

          <div class="viz-proposal" id="vizProposal" style="display:none;">
            <div class="proposal-toolbar">
              <h2 class="proposal-title" id="proposalTitle">经营提案</h2>
            </div>
            <div class="proposal-body" id="proposalBody"></div>
          </div>

          <div class="viz-charts" id="vizCharts"></div>
          <div class="viz-answer" id="vizAnswer" style="display:none;"></div>
        </section>
      </main>
    </div>
  </div>

  <script src="assets/assistant.js" defer></script>
  <script src="assets/markdown.js" defer></script>
  <script src="assets/auth.js?v=username-fix" defer></script>
  <script src="assets/app.js?v=no-ar" defer></script>
</body>
</html>
